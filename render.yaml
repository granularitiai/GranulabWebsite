services:
  - type: web
    name: granulariti-labloop-api
    runtime: python
    plan: free
    region: ohio
    rootDir: backend/labloop
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GSA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LABLOOP_DB_PATH
        value: /tmp/labloop.db
      - key: CORS_ORIGINS
        value: https://granularitiwebsite.vercel.app,http://localhost:5173,http://127.0.0.1:5173
